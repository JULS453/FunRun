<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Run</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        /* Interfaz */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        #monedas { color: #FFD700; }
        #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10; /* Asegura que esté por encima de todo */
        }
        #startScreen h1 { font-size: 80px; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; }

        
        
        /* Pantalla de Game Over */
        #gameOverScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none; /* Oculto por defecto */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        #gameOverScreen h1 { font-size: 60px; margin: 0; color: #ff3333; }
        #gameOverScreen p { font-size: 24px; }
        button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover { background-color: #45a049; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="ui">
        <div>Distancia: <span id="distancia">0</span> m</div>
        <div>Monedas: <span id="monedas">0</span></div>
    </div>

    <div id="startScreen">
    <h1>FUN RUN</h1>
    <p>Usa las flechas o A/D para moverte y Espacio para saltar</p>
    <button onclick="startGame()">EMPEZAR A JUGAR</button>
</div>

    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p>Distancia recorrida: <span id="finalDist">0</span> m</p>
        <p>Monedas recogidas: <span id="finalCoins">0</span></p>
        <button onclick="location.reload()">Reintentar</button>
    </div>

    <div id="container"></div>

    <script src="./js/corredor.js"></script>
</body>
</html>
